<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="ttl">Property | Dimora View Properties</title>
<meta name="description" content="View full property details, photos, specifications and investment yield on Dimora View Properties." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--ivory: #F7F3ED;
--warm-white: #FDFAF6;
--charcoal: #1A1A18;
--deep: #0D0D0B;
--gold: #C9A84C;
--gold-light: #E8C97A;
--sand: #D4C5A9;
--muted: #7A7167;
--card-bg: #FFFFFF;
--border: rgba(201,168,76,0.2);
--shadow: 0 8px 40px rgba(26,26,24,0.1);
}

html { scroll-behavior: smooth; }

body {
font-family: 'DM Sans', sans-serif;
background: var(--warm-white);
color: var(--charcoal);
overflow-x: hidden;
}

/* ── NAV ── */
nav {
position: fixed; top: 0; width: 100%; z-index: 1000;
padding: 20px 60px;
display: flex; align-items: center; justify-content: space-between;
background: transparent;
transition: background .4s, padding .4s;
}
nav.scrolled {
background: rgba(253,250,246,0.95);
backdrop-filter: blur(12px);
padding: 14px 60px;
box-shadow: 0 2px 24px rgba(26,26,24,0.08);
}
.nav-logo {
font-family: 'Cormorant Garamond', serif;
font-size: 1.5rem; font-weight: 600;
color: var(--warm-white);
letter-spacing: .04em;
transition: color .4s;
text-decoration: none;
}
nav.scrolled .nav-logo { color: var(--charcoal); }
.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a {
font-size: .85rem; font-weight: 400; letter-spacing: .1em;
text-transform: uppercase; text-decoration: none;
color: rgba(255,255,255,.8);
transition: color .3s;
}
nav.scrolled .nav-links a { color: var(--muted); }
.nav-links a:hover, nav.scrolled .nav-links a:hover { color: var(--gold); }
.nav-cta {
padding: 10px 26px;
background: var(--gold);
color: var(--deep) !important;
border-radius: 2px; font-weight: 500 !important;
letter-spacing: .06em !important;
transition: background .3s, transform .2s !important;
}
.nav-cta:hover { background: var(--gold-light) !important; transform: translateY(-1px); }
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
.hamburger span { width: 26px; height: 1.5px; background: white; transition: background .4s; }
nav.scrolled .hamburger span { background: var(--charcoal); }

/* ── HERO ── */
#hero {
height: 100vh; min-height: 680px;
position: relative; display: flex; align-items: flex-end;
overflow: hidden;
}
.hero-bg {
position: absolute; inset: 0;
background: linear-gradient(160deg, #1a1612 0%, #2a221a 40%, #1a1612 100%);
}
.hero-bg::before {
content: '';
position: absolute; inset: 0;
background: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1800&auto=format&fit=crop&q=80') center/cover;
opacity: .45;
}
.hero-bg::after {
content: '';
position: absolute; inset: 0;
background: linear-gradient(to top, rgba(13,13,11,.9) 0%, rgba(13,13,11,.3) 60%, transparent 100%);
}
.hero-content {
position: relative; z-index: 2;
padding: 0 60px 80px;
max-width: 760px;
animation: heroIn .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes heroIn { from { opacity:0; transform: translateY(40px); } to { opacity:1; transform:translateY(0); } }
.hero-eyebrow {
font-size: .75rem; letter-spacing: .25em; text-transform: uppercase;
color: var(--gold); margin-bottom: 20px;
display: flex; align-items: center; gap: 12px;
}
.hero-eyebrow::before { content:''; width:32px; height:1px; background:var(--gold); }
.hero-title {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(3rem, 6vw, 5.5rem);
font-weight: 300; line-height: 1.08;
color: var(--warm-white);
margin-bottom: 24px;
}
.hero-title em { font-style: italic; color: var(--gold-light); }
.hero-sub {
font-size: 1rem; font-weight: 300; line-height: 1.7;
color: rgba(247,243,237,.7);
max-width: 480px; margin-bottom: 44px;
}
.hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
.btn-primary {
padding: 15px 36px;
background: var(--gold); color: var(--deep);
font-family: 'DM Sans', sans-serif;
font-size: .85rem; font-weight: 500; letter-spacing: .1em;
text-transform: uppercase; text-decoration: none;
border: none; cursor: pointer;
border-radius: 2px;
transition: background .3s, transform .2s;
display: inline-block;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
.btn-ghost {
padding: 15px 36px;
background: transparent;
color: var(--warm-white);
font-family: 'DM Sans', sans-serif;
font-size: .85rem; font-weight: 400; letter-spacing: .1em;
text-transform: uppercase; text-decoration: none;
border: 1px solid rgba(247,243,237,.35);
border-radius: 2px; cursor: pointer;
transition: border-color .3s, background .3s, transform .2s;
display: inline-block;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
.hero-stats {
position: absolute; right: 60px; bottom: 80px; z-index: 2;
display: flex; flex-direction: column; gap: 24px;
animation: heroIn 1.1s cubic-bezier(.22,1,.36,1) .2s both;
}
.stat-pill {
background: rgba(247,243,237,.08);
backdrop-filter: blur(12px);
border: 1px solid rgba(201,168,76,.25);
border-radius: 4px;
padding: 14px 22px;
text-align: right;
}
.stat-num {
font-family: 'Cormorant Garamond', serif;
font-size: 2rem; font-weight: 300; color: var(--gold-light);
line-height: 1;
}
.stat-lbl { font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(247,243,237,.5); margin-top: 2px; }
.scroll-hint {
position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px;
color: rgba(247,243,237,.4); font-size: .7rem; letter-spacing: .14em; text-transform: uppercase;
}
.scroll-line {
width: 1px; height: 50px;
background: linear-gradient(to bottom, rgba(201,168,76,.6), transparent);
animation: scrollPulse 2s infinite;
}
@keyframes scrollPulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── SEARCH BAR ── */
.search-strip {
background: var(--charcoal);
padding: 28px 60px;
display: flex; gap: 0; align-items: stretch;
}
.search-strip select, .search-strip input {
flex: 1; padding: 14px 18px;
background: rgba(255,255,255,.07);
border: 1px solid rgba(255,255,255,.1);
color: var(--warm-white);
font-family: 'DM Sans', sans-serif;
font-size: .88rem;
outline: none;
transition: border-color .3s;
}
.search-strip select option { background: var(--charcoal); }
.search-strip select:hover, .search-strip input:hover,
.search-strip select:focus, .search-strip input:focus { border-color: var(--gold); }
.search-strip .btn-primary { border-radius: 0; white-space: nowrap; }

/* ── SECTION SHARED ── */
section { padding: 100px 60px; }
.section-eyebrow {
font-size: .72rem; letter-spacing: .22em; text-transform: uppercase;
color: var(--gold); margin-bottom: 14px;
display: flex; align-items: center; gap: 10px;
}
.section-eyebrow::before { content:''; width:24px; height:1px; background:var(--gold); }
.section-title {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(2rem, 4vw, 3.2rem);
font-weight: 300; line-height: 1.15;
color: var(--charcoal);
margin-bottom: 16px;
}
.section-sub {
font-size: .95rem; color: var(--muted); line-height: 1.7;
max-width: 520px;
}

/* ── LOCATION CAROUSEL ── */
#locations { padding-bottom: 80px; }
.loc-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 48px; flex-wrap: wrap; gap: 16px; }
.loc-controls { display: flex; gap: 10px; }
.carousel-btn {
width: 44px; height: 44px; border-radius: 50%;
border: 1px solid var(--border);
background: transparent; cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: var(--charcoal); font-size: 1.1rem;
transition: background .3s, border-color .3s, color .3s;
}
.carousel-btn:hover { background: var(--gold); border-color: var(--gold); color: var(--deep); }
.carousel-track-wrap { overflow: hidden; position: relative; }
.carousel-track {
display: flex; gap: 24px;
transition: transform .55s cubic-bezier(.25,.46,.45,.94);
}
.loc-card {
min-width: 300px; width: 300px; height: 400px;
border-radius: 4px; overflow: hidden;
position: relative; cursor: pointer;
flex-shrink: 0;
}
.loc-card img {
width: 100%; height: 100%; object-fit: cover;
transition: transform .6s ease;
}
.loc-card:hover img { transform: scale(1.06); }
.loc-overlay {
position: absolute; inset: 0;
background: linear-gradient(to top, rgba(13,13,11,.85) 0%, rgba(13,13,11,.1) 60%);
display: flex; flex-direction: column; justify-content: flex-end;
padding: 28px 24px;
transition: background .4s;
}
.loc-card:hover .loc-overlay { background: linear-gradient(to top, rgba(13,13,11,.9) 0%, rgba(13,13,11,.2) 60%); }
.loc-badge {
position: absolute; top: 18px; right: 18px;
background: var(--gold); color: var(--deep);
font-size: .68rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
padding: 5px 12px; border-radius: 2px;
}
.loc-name {
font-family: 'Cormorant Garamond', serif;
font-size: 1.8rem; font-weight: 400; color: white; line-height: 1.1;
}
.loc-count { font-size: .78rem; color: rgba(247,243,237,.6); margin-top: 6px; }
.loc-arrow {
margin-top: 14px; width: 36px; height: 36px;
border: 1px solid rgba(201,168,76,.4); border-radius: 50%;
display: flex; align-items: center; justify-content: center;
color: var(--gold); font-size: .9rem;
transform: translateX(-8px); opacity: 0;
transition: transform .35s, opacity .35s;
}
.loc-card:hover .loc-arrow { transform: translateX(0); opacity: 1; }
.more-btn-wrap { text-align: center; margin-top: 48px; }
.btn-outline {
display: inline-block; padding: 13px 36px;
border: 1px solid var(--gold); color: var(--gold);
font-family: 'DM Sans', sans-serif;
font-size: .82rem; font-weight: 400; letter-spacing: .12em;
text-transform: uppercase; text-decoration: none;
border-radius: 2px; cursor: pointer; background: transparent;
transition: background .3s, color .3s;
}
.btn-outline:hover { background: var(--gold); color: var(--deep); }

/* ── PROPERTY TYPES ── */
#property-types { background: var(--ivory); }
.types-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
gap: 20px; margin-top: 52px;
}
.type-card {
background: white; border-radius: 4px;
padding: 36px 28px;
border: 1px solid rgba(201,168,76,.1);
cursor: pointer; position: relative; overflow: hidden;
transition: box-shadow .35s, transform .3s;
}
.type-card::before {
content: '';
position: absolute; bottom: 0; left: 0;
width: 100%; height: 3px;
background: var(--gold); transform: scaleX(0);
transform-origin: left; transition: transform .4s;
}
.type-card:hover { box-shadow: var(--shadow); transform: translateY(-4px); }
.type-card:hover::before { transform: scaleX(1); }
.type-icon { font-size: 2.2rem; margin-bottom: 18px; }
.type-name {
font-family: 'Cormorant Garamond', serif;
font-size: 1.35rem; font-weight: 400; color: var(--charcoal);
margin-bottom: 8px;
}
.type-desc { font-size: .83rem; color: var(--muted); line-height: 1.6; }
.type-count {
margin-top: 18px; font-size: .75rem; letter-spacing: .1em;
text-transform: uppercase; color: var(--gold); font-weight: 500;
}

/* ── FEATURED LISTINGS ── */
#listings { padding: 100px 60px; }
.listings-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 52px; flex-wrap: wrap; gap: 16px; }
.listings-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
gap: 28px;
}
.listing-card {
background: white; border-radius: 4px; overflow: hidden;
box-shadow: 0 2px 16px rgba(26,26,24,.06);
transition: box-shadow .35s, transform .3s;
}
.listing-card:hover { box-shadow: var(--shadow); transform: translateY(-4px); }
.listing-img { position: relative; height: 220px; overflow: hidden; }
.listing-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s; }
.listing-card:hover .listing-img img { transform: scale(1.05); }
.listing-tag {
position: absolute; top: 16px; left: 16px;
background: var(--charcoal); color: var(--gold);
font-size: .68rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
padding: 5px 12px; border-radius: 2px;
}
.listing-tag.invest { background: var(--gold); color: var(--deep); }
.listing-fav {
position: absolute; top: 16px; right: 16px;
width: 34px; height: 34px; border-radius: 50%;
background: rgba(255,255,255,.9); border: none; cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 1rem; transition: transform .2s;
}
.listing-fav:hover { transform: scale(1.15); }
.listing-body { padding: 22px 24px 24px; }
.listing-price {
font-family: 'Cormorant Garamond', serif;
font-size: 1.6rem; font-weight: 300; color: var(--charcoal);
}
.listing-price span { font-size: 1rem; color: var(--muted); }
.listing-name { font-size: .9rem; font-weight: 500; color: var(--charcoal); margin: 8px 0 4px; }
.listing-loc { font-size: .8rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.listing-meta {
margin-top: 16px; padding-top: 16px;
border-top: 1px solid rgba(201,168,76,.15);
display: flex; gap: 20px;
}
.meta-item { font-size: .78rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.yield-badge {
margin-top: 14px;
background: rgba(201,168,76,.1);
border: 1px solid rgba(201,168,76,.25);
border-radius: 2px; padding: 8px 12px;
font-size: .78rem; color: var(--gold); font-weight: 500;
}

/* ── INVESTMENT ── */
#investment {
background: var(--charcoal);
color: var(--warm-white);
position: relative; overflow: hidden;
}
#investment::before {
content: '';
position: absolute; top: -120px; right: -120px;
width: 500px; height: 500px;
background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%);
pointer-events: none;
}
#investment .section-title { color: var(--warm-white); }
#investment .section-sub { color: rgba(247,243,237,.6); }
.invest-grid {
display: grid; grid-template-columns: 1fr 1fr;
gap: 80px; margin-top: 64px; align-items: center;
}
.invest-cards { display: flex; flex-direction: column; gap: 20px; }
.invest-card {
background: rgba(255,255,255,.05);
border: 1px solid rgba(201,168,76,.2);
border-radius: 4px; padding: 28px 24px;
display: flex; gap: 20px; align-items: flex-start;
transition: background .3s;
}
.invest-card:hover { background: rgba(201,168,76,.08); }
.invest-icon {
width: 48px; height: 48px; border-radius: 50%;
background: rgba(201,168,76,.15);
display: flex; align-items: center; justify-content: center;
font-size: 1.3rem; flex-shrink: 0;
}
.invest-card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; color: var(--gold-light); margin-bottom: 6px; }
.invest-card-desc { font-size: .83rem; color: rgba(247,243,237,.6); line-height: 1.65; }
.invest-stats { display: flex; flex-direction: column; gap: 32px; }
.big-stat {
border-left: 2px solid var(--gold);
padding-left: 28px;
}
.big-num {
font-family: 'Cormorant Garamond', serif;
font-size: 4rem; font-weight: 300; color: var(--gold-light); line-height: 1;
}
.big-lbl { font-size: .85rem; color: rgba(247,243,237,.5); margin-top: 6px; max-width: 200px; line-height: 1.5; }
.invest-chart { margin-top: 40px; }
.chart-label { font-size: .78rem; color: rgba(247,243,237,.5); margin-bottom: 16px; letter-spacing: .1em; text-transform: uppercase; }
.bar-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.bar-yr { font-size: .78rem; color: rgba(247,243,237,.5); width: 36px; flex-shrink: 0; }
.bar-wrap { flex: 1; height: 8px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); animation: barGrow 1.2s ease both; }
@keyframes barGrow { from { width: 0 !important; } }
.bar-val { font-size: .78rem; color: var(--gold-light); width: 36px; flex-shrink: 0; }

/* ── TESTIMONIALS ── */
#testimonials { background: var(--ivory); }
.testi-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 24px; margin-top: 52px;
}
.testi-card {
background: white; border-radius: 4px; padding: 32px;
border: 1px solid rgba(201,168,76,.1);
position: relative;
}
.testi-card::before {
content: '"';
font-family: 'Cormorant Garamond', serif;
font-size: 5rem; color: rgba(201,168,76,.15);
position: absolute; top: 10px; right: 20px; line-height: 1;
}
.testi-text { font-size: .9rem; color: var(--muted); line-height: 1.75; margin-bottom: 22px; }
.testi-author { display: flex; align-items: center; gap: 12px; }
.testi-avatar {
width: 44px; height: 44px; border-radius: 50%;
background: var(--gold); display: flex; align-items: center; justify-content: center;
font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--deep);
}
.testi-name { font-size: .88rem; font-weight: 500; color: var(--charcoal); }
.testi-role { font-size: .75rem; color: var(--muted); }
.stars { color: var(--gold); font-size: .85rem; margin-bottom: 14px; }

/* ── PARTNERS ── */
#partners { padding: 60px 60px; border-top: 1px solid rgba(201,168,76,.15); }
.partners-label {
text-align: center; font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
color: var(--muted); margin-bottom: 40px;
}
.partners-track-wrap { overflow: hidden; }
.partners-track {
display: flex; gap: 60px; align-items: center;
animation: partnerScroll 18s linear infinite;
}
@keyframes partnerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.partner-logo {
flex-shrink: 0; opacity: .45; filter: grayscale(100%);
transition: opacity .3s, filter .3s;
font-family: 'Cormorant Garamond', serif;
font-size: 1.2rem; letter-spacing: .08em;
color: var(--charcoal); white-space: nowrap;
}
.partner-logo:hover { opacity: 1; filter: none; }
.partners-track-wrap:hover .partners-track { animation-play-state: paused; }

/* ── CTA BANNER ── */
#cta-banner {
background: var(--gold);
padding: 80px 60px;
display: flex; align-items: center; justify-content: space-between;
gap: 40px; flex-wrap: wrap;
}
#cta-banner h2 {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(1.8rem, 3.5vw, 3rem);
font-weight: 300; color: var(--deep);
max-width: 560px; line-height: 1.2;
}
.cta-dark {
padding: 16px 38px;
background: var(--deep); color: var(--gold);
font-family: 'DM Sans', sans-serif;
font-size: .85rem; font-weight: 500; letter-spacing: .1em;
text-transform: uppercase; text-decoration: none;
border-radius: 2px;
transition: background .3s, transform .2s;
white-space: nowrap;
}
.cta-dark:hover { background: var(--charcoal); transform: translateY(-2px); }

/* ── FOOTER ── */
footer {
background: var(--deep); color: rgba(247,243,237,.5);
padding: 72px 60px 40px;
}
.footer-grid {
display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
gap: 60px; margin-bottom: 64px;
}
.footer-brand .nav-logo { color: var(--warm-white); display: block; margin-bottom: 16px; }
.footer-brand p { font-size: .85rem; line-height: 1.7; max-width: 260px; }
.footer-socials { display: flex; gap: 12px; margin-top: 24px; }
.social-btn {
width: 36px; height: 36px; border-radius: 50%;
border: 1px solid rgba(247,243,237,.15);
display: flex; align-items: center; justify-content: center;
color: rgba(247,243,237,.5); font-size: .85rem;
text-decoration: none;
transition: border-color .3s, color .3s, background .3s;
}
.social-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }
.footer-col h4 {
font-size: .75rem; letter-spacing: .18em; text-transform: uppercase;
color: var(--warm-white); margin-bottom: 20px;
}
.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer-col ul a {
font-size: .83rem; color: rgba(247,243,237,.45); text-decoration: none;
transition: color .3s;
}
.footer-col ul a:hover { color: var(--gold); }
.footer-bottom {
border-top: 1px solid rgba(247,243,237,.08);
padding-top: 32px; display: flex; justify-content: space-between;
align-items: center; font-size: .78rem; flex-wrap: wrap; gap: 10px;
}
.footer-bottom a { color: var(--gold); text-decoration: none; }

/* ── MODAL ── */
.modal-backdrop {
position: fixed; inset: 0; background: rgba(13,13,11,.8);
backdrop-filter: blur(4px); z-index: 2000;
display: flex; align-items: center; justify-content: center;
opacity: 0; pointer-events: none; transition: opacity .35s;
}

/* ════════════════ MOBILE BEHAVIOURS (the three requests) ════════════════ */
@media (max-width: 900px) {

  .loc-controls { display: none; }                  /* desktop arrows hidden — swipe instead */
  .carousel-track-wrap { overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }

  .loc-card { min-width: 0; width: 43%; flex: 0 0 43%; height: 300px; scroll-snap-align: start; }

  .types-grid { grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 36px; }

  /* (2) FEATURED LISTINGS — native swipe carousel, 2 + peek, capped at 4 */

  .view-more-mobile { display: block; }

  .page-hero { padding: 100px 28px 48px; min-height: 46vh; }
}

/* ── FAVOURITES ── */
const FAV_KEY = 'dimora_favs_v1';
function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch (e) { return []; } }
function toggleFav(id) {
  let favs = getFavs();
  id = Number(id);
  if (favs.includes(id)) favs = favs.filter(f => f !== id); else favs.push(id);
  try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch (e) {}
  return favs.includes(id);
}

/* ── SCROLL-SNAP CAROUSEL (works for both desktop buttons + mobile swipe) ── */
function initCarousel(wrapSel, prevSel, nextSel) {
  const wrap = document.querySelector(wrapSel);
  if (!wrap) return;
  const step = () => {
    const card = wrap.querySelector('.loc-card, .listing-card');
    return card ? card.getBoundingClientRect().width + 24 : 320;
  };
  const prev = prevSel && document.querySelector(prevSel);
  const next = nextSel && document.querySelector(nextSel);
  if (prev) prev.addEventListener('click', () => wrap.scrollBy({ left: -step(), behavior: 'smooth' }));
  if (next) next.addEventListener('click', () => wrap.scrollBy({ left: step(), behavior: 'smooth' }));
}

/* one-time "toggle in/out" nudge to hint swipe-ability on mobile */
function nudgeCarousel(sel) {
  if (window.innerWidth > 900) return;
  const wrap = document.querySelector(sel);
  if (!wrap) return;
  setTimeout(() => {
    wrap.scrollTo({ left: 70, behavior: 'smooth' });
    setTimeout(() => wrap.scrollTo({ left: 0, behavior: 'smooth' }), 650);
  }, 900);
}

/* ── NAV / MOBILE MENU ── */
function initChrome() {
  const nav = document.getElementById('mainNav');
  if (nav && !nav.classList.contains('solid')) {
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));
  }
  const burger = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  if (burger && menu) {
    burger.addEventListener('click', () => { menu.classList.add('open'); document.body.style.overflow = 'hidden'; });
    const close = document.getElementById('mobileClose');
    if (close) close.addEventListener('click', closeMobile);
  }
}
function closeMobile() {
  const menu = document.getElementById('mobileMenu');
  if (menu) menu.classList.remove('open');
  document.body.style.overflow = '';
}

/* ── MODAL ── */
function openModal() { const m = document.getElementById('modalBackdrop'); if (m) { m.classList.add('open'); document.body.style.overflow = 'hidden'; } }
function closeModal() { const m = document.getElementById('modalBackdrop'); if (m) { m.classList.remove('open'); document.body.style.overflow = ''; } }
function handleBackdropClick(e) { if (e.target === document.getElementById('modalBackdrop')) closeModal(); }

/* ── TOAST ── */
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3500);
}

/* ── SCROLL REVEAL ── */
function initReveal() {
  const els = document.querySelectorAll('.fade-up');
  if (!els.length) return;
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); } });
  }, { threshold: 0.12 });
  els.forEach(el => obs.observe(el));
}
